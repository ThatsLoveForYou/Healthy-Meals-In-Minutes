<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Meals in Minutes | TLFY Wellness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-emerald-50 text-slate-800 font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-emerald-100">
        <div class="bg-emerald-600 p-6 text-center">
            <h1 class="text-2xl font-bold text-white uppercase tracking-tight">TLFY Wellness</h1>
            <p class="text-emerald-100 text-sm">Healthy Meals in Minutes</p>
        </div>

        <div class="p-8 text-center">
            <div id="meal-display" class="hidden fade-in">
                <span class="inline-block px-3 py-1 bg-emerald-100 text-emerald-700 rounded-full text-xs font-bold mb-3 uppercase tracking-wider">Today's Suggestion</span>
                <h2 id="meal-name" class="text-2xl font-bold text-slate-800 mb-2"></h2>
                <p id="meal-description" class="text-slate-600 mb-6 italic"></p>
                
                <div class="grid grid-cols-2 gap-4 mb-6 text-sm">
                    <div class="bg-slate-50 p-3 rounded-xl">
                        <p class="text-xs text-slate-400 font-bold uppercase">Prep Time</p>
                        <p id="prep-time" class="font-semibold"></p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-xl">
                        <p class="text-xs text-slate-400 font-bold uppercase">Wellness Tip</p>
                        <p id="wellness-tip" class="font-semibold text-emerald-600">High Protein</p>
                    </div>
                </div>
            </div>

            <div id="empty-state">
                <p class="text-slate-400 mb-6">Need a quick, nutritious idea for your shift or a family dinner?</p>
            </div>

            <button onclick="generateMeal()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-lg">
                GENERATE MEAL IDEA
            </button>
        </div>
    </div>

    <p class="mt-8 text-xs text-slate-400">© 2026 That's Love For You Wellness Systems</p>

    <script>
        const meals = [
            { name: "Lemon Pepper Salmon & Asparagus", desc: "Sheet pan roasted with olive oil and garlic.", time: "15-20 Mins", tip: "Omega-3 Rich" },
            { name: "Mediterranean Chickpea Salad", desc: "Cucumber, tomato, feta, and lemon vinaigrette.", time: "10 Mins", tip: "Fiber Boost" },
            { name: "Turkey & Avocado Power Wraps", desc: "Whole grain wraps with spinach and sprouts.", time: "5 Mins", tip: "Lean Protein" },
            { name: "Quinoa & Roasted Veggie Bowl", desc: "Prep veggies on Sunday for a quick weekday assembly.", time: "12 Mins", tip: "Energy Sustainer" },
            { name: "Pesto Chicken Zucchini Noodles", desc: "A low-carb favorite that feels like a gourmet treat.", time: "15 Mins", tip: "Low Glycemic" }
        ];

        function generateMeal() {
            const meal = meals[Math.floor(Math.random() * meals.length)];
            
            document.getElementById('empty-state').classList.add('hidden');
            const display = document.getElementById('meal-display');
            display.classList.remove('hidden');
            
            // Re-trigger animation
            display.classList.remove('fade-in');
            void display.offsetWidth; 
            display.classList.add('fade-in');

            document.getElementById('meal-name').innerText = meal.name;
            document.getElementById('meal-description').innerText = meal.desc;
            document.getElementById('prep-time').innerText = meal.time;
            document.getElementById('wellness-tip').innerText = meal.tip;
        }
    </script>
</body>
</html>
